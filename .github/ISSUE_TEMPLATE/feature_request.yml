name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem you're trying to solve.
  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: Describe what you want to happen.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context or screenshots here.

